name: "Publish Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  # --- PHASE 1: CREATE THE UNIFIED RELEASE DRAFT ---
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    outputs:
      changelog_body: ${{ steps.changelog.outputs.body }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract changelog for current version
        id: changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(awk -v ver="$VERSION" '
            BEGIN { found=0 }
            /^## \[/ {
              if (index($0, "[" ver "]")) { found=1; print; next }
              else if (found) exit
            }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$BODY" ]; then
            BODY="No changelog found for version ${VERSION}."
          fi

          # Fix multiline output escaping for modern GitHub Actions
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Initialize GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "HeriHeri v${GITHUB_REF_NAME#v}" \
            --notes "${{ steps.changelog.outputs.body }}" \
            --draft=true

  # --- PHASE 2: COMPILE DESKTOP TARGETS (RUNS IN PARALLEL) ---
  publish-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            webkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri Application & Inject Assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HERIHERI_SECRET_KEY: ${{ secrets.HERIHERI_SECRET_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "HeriHeri v__VERSION__"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # --- PHASE 3: COMPILE MOBILE TARGETS (RUNS IN PARALLEL) ---
  publish-android:
    needs: create-release
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java for Android
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Rust stable with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Build Android APK
        env:
            HERIHERI_SECRET_KEY: ${{ secrets.HERIHERI_SECRET_KEY }}
        run: |
          export NDK_HOME=$ANDROID_NDK_HOME
          npm run tauri android build -- --apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HERIHERI_SECRET_KEY: ${{ secrets.HERIHERI_SECRET_KEY }}
        run: |
          tag_name: ${{ github.ref_name }}
          files: 'src-tauri/gen/android/app/build/outputs/apk/**/*.apk'

  # --- PHASE 4: AUTOMATICALLY PUBLISH THE RELEASE ---
  finalize-release:
    needs: [publish-tauri, publish-android]
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: Publish Release Draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ github.ref_name }} --draft=false